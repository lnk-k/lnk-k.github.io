{{ define "main" }}
  <section class="page-heading">
    <p class="eyebrow">Index</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </section>

  <section class="section compact">
    <div class="term-cloud">
      {{ range .Data.Terms.Alphabetical }}
        <a href="{{ .Page.RelPermalink }}">
          <span>{{ .Page.Title }}</span>
          <strong>{{ .Count }}</strong>
        </a>
      {{ else }}
        <p>这里还没有内容。</p>
      {{ end }}
    </div>
  </section>
{{ end }}
